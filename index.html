<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Maths Quest 50</title>
    <style>
      :root { 
        --bg: #1a1a2e; 
        --panel: #16213e; 
        --accent: #4ecca3; 
        --danger: #ff5e78; 
        --gold: #fca311; 
        --text-main: #ffffff;
      }
      html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; }
      body { 
        background: var(--bg); 
        color: var(--text-main); 
        font-family: sans-serif; 
        display: flex; 
        justify-content: center; 
        padding: 10px; 
      }
      #app { 
        width: 92vw;
        max-width: 450px; 
        background: var(--panel); 
        border: 3px solid var(--accent); 
        border-radius: 15px; 
        padding: 15px;
        box-sizing: border-box;
        min-height: 80vh;
      }
      .map-grid { display: grid; gap: 10px; margin-top: 15px; }
      .quest-btn { 
        background: #0f3460; 
        border: 2px solid var(--accent); 
        color: white; 
        padding: 16px; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        text-align: left;
      }
      .boss-area { border: 2px dashed var(--danger); padding: 15px; text-align: center; border-radius: 10px; margin-top: 20px; }
      input { padding: 12px; width: 80%; border-radius: 5px; border: none; font-size: 16px; margin-bottom: 10px; text-align: center; color: #000; }
      .attack-btn { background: var(--danger); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
      .back-btn { background: transparent; border: 1px solid #aaa; color: #aaa; cursor: pointer; margin-bottom: 15px; padding: 8px 12px; border-radius: 4px; }
      .hidden { display: none !important; }
    </style>
</head>
<body>

<main id="app">
  <header style="text-align:center">
    <h1 style="margin: 0; color: var(--gold);">⚔️ MATH QUEST ⚔️</h1>
    <p style="font-size:0.8rem; opacity:0.8;">50 Random Challenges</p>
  </header>

  <div id="map-view">
    <div class="map-grid">
      <button class="quest-btn" onclick="startTraining('ratios')">🔀 Ratio Realm</button>
      <button class="quest-btn" onclick="startTraining('geometry')">📐 Angle Abyss</button>
      <button class="quest-btn" onclick="startTraining('percentage')">💰 Percent Palace</button>
      <button class="quest-btn" onclick="startTraining('volume')">💧 Volume Void</button>
      <button class="quest-btn" onclick="startTraining('heuristics')">🧠 Logic Labyrinth</button>
    </div>
  </div>

  <div id="quest-view" class="hidden">
    <button class="back-btn" onclick="goHome()">⬅️ Back</button>
    <h2 id="q-title" style="color: var(--accent); margin: 0;"></h2>
    <div class="boss-area">
      <p id="q-text" style="font-size: 1.1rem; margin-bottom: 15px;"></p>
      <input type="number" id="user-input" placeholder="Answer...">
      <button class="attack-btn" onclick="doAttack()">ATTACK!</button>
      <p id="q-feedback" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
  </div>
</main>
