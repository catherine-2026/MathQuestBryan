        --text-main: #ffffff;

      html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; touch-action: auto; }

        color: var(--text-main);

        display: flex; 
        justify-content: center; 
        padding: 10px; 
      }

      #app { 
        width: 92vw;
        max-width: 450px; 
        background: var(--panel); 
        border: 3px solid var(--accent); 
        border-radius: 15px; 
        padding: 15px;
        box-sizing: border-box;
        box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        min-height: 90vh;
      }

      .map-grid { display: grid; gap: 10px; margin-top: 15px; }
      
      .quest-btn {

        border: 2px solid var(--accent); 
        color: white; 
        padding: 16px; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 1rem; 
        text-align: left;
      }
