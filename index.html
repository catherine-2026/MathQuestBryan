<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Quest App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>

    <style>
      :root { --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; --danger: #e94560; --gold: #fca311; }
      body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
      #app { width: 100%; max-width: 450px; background: var(--panel); border: 3px solid var(--accent); border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .status-bar { background: #0f3460; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1a1a2e; }
      .xp-bar-container { height: 8px; background: #111; border-radius: 4px; margin: 8px 0; overflow: hidden; }
      #xp-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.4s; }
      .map-grid { display: grid; gap: 10px; margin-top: 15px; }
      .quest-btn { background: #0f3460; border: 1px solid var(--accent); color: white; padding: 18px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: bold; font-size: 1rem; }
      .quest-btn:hover { background: var(--accent); color: #111; }
      .scroll-section { background: #eee; color: #333; padding: 12px; border-radius: 5px; margin: 15px 0; border-left: 8px solid var(--gold); line-height: 1.4; }
      .boss-area { border: 2px dashed var(--danger); padding: 15px; text-align: center; border-radius: 10px; }
      input { padding: 12px; width: 80%; border-radius: 5px; border: none; font-size: 1rem; margin-bottom: 10px; text-align: center; }
      .attack-btn { background: var(--danger); color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
      .back-btn { background: transparent; border: 1px solid #777; color: #ccc; cursor: pointer; margin-bottom: 15px; padding: 8px 12px; border-radius: 4px; }
      .hidden { display: none !important; }
      .gem-box { margin-top: 25px; background: #0f3460; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); text-align: center; }
      .gem-link { display: block; background: #111; color: var(--gold); padding: 12px; margin-top: 8px; border-radius: 5px; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; font-weight: bold; }
      .footer { margin-top: 20px; text-align: center; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
<main> <div id="app">

  <div class="status-bar">
    <div style="display:flex; justify-content:space-between; font-size: 0.9rem;">
      <span>🛡️ Rank: <span id="rank-name">Math Novice</span></span>
      <span>⭐ XP: <span id="xp-count">0</span></span>
    </div>
    <div class="xp-bar-container"><div id="xp-fill"></div></div>
  </div>
  
  <header style="text-align:center">
    <h1 style="margin: 0; color: var(--gold);">⚔️ MATH QUEST ⚔️</h1>
    <p style="font-size:0.8rem; color:#ccc; margin: 5px 0 20px 0;">Baked with ❤️ for our dearest Bryan</p>
  </header>

  <div id="map-view">
    <h3 style="color: var(--gold); text-align:center; margin: 0;">🗺️ SELECT TRAINING ZONE</h3>
    <div class="map-grid">
      <button class="quest-btn" onclick="startTraining('ratios')">🔀 Ratio Realm</button>
      <button class="quest-btn" onclick="startTraining('geometry')">📐 Angle Abyss</button>
      <button class="quest-btn" onclick="startTraining('percentage')">💰 Percent Palace</button>
      <button class="quest-btn" onclick="startTraining('volume')">💧 Volume Void</button>
      <button class="quest-btn" onclick="startTraining('heuristics')">🧠 Logic Labyrinth</button>
    </div>
  </div>

  <div id="quest-view" class="hidden">
    <button class="back-btn" onclick="goHome()">⬅️ Back to Map</button>
    <h2 id="q-title" style="color: var(--accent); margin: 0;"></h2>
    <div class="scroll-section">
      <p id="q-strategy" style="font-weight: bold; margin: 0;"></p>
      <p id="q-tip" style="font-size: 0.85rem; margin: 8px 0 0 0; color: #555;"></p>
    </div>
    <div class="boss-area">
      <div class="boss-icon">👾 Boss</div>
      <p id="q-text" style="font-size: 1.1rem; margin-bottom: 15px;"></p>
      <input type="number" id="user-input" placeholder="Enter number...">
      <button class="attack-btn" onclick="doAttack()">ATTACK! ⚔️</button>
      <p id="q-feedback" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
  </div>

  <div class="gem-box">
    <h4 style="margin:0; color:var(--gold)">🤖 GEMINI AI GEMS</h4>
    <a class="gem-link" href="https://gemini.google.com/gem/14PMn2hzOV7c6aFUwviTmGkAlypz757uG" target="_blank">📸 Maths Grader</a>
    <a class="gem-link" href="https://gemini.google.com/gem/1kl4CP0hBA3ANwk2TPv0IFouJRUH9sC-m" target="_blank">⚡ Speed Drill</a>
    <a class="gem-link" href="https://gemini.google.com/gem/1NtyzKWt_6ETZJyhw41vUDD_X5X-P0jDJ" target="_blank">🎒 Step-by-Step Coach</a>
  </div>

  <div class="footer">
    Copyright © 2026 [Catherine N.C.L]. All Rights Reserved. 
  </div>
</div>

<script>
  const data = {
    ratios: { t: "Ratio Realm", s: "Units Method", i: "If 5 units = 25, then 1 unit = 5.", q: "Ratio 2:5. If the larger part is 25, what is the smaller part?", a: 10 },
    geometry: { t: "Angle Abyss", s: "Angle Sum", i: "Angles in a triangle = 180°.", q: "Two angles are 40° and 60°. What is the 3rd angle?", a: 80 },
    percentage: { t: "Percent Palace", s: "9% GST", i: "Multiply by 0.09 for GST.", q: "What is 9% GST on a $100 item?", a: 9 },
    volume: { t: "Volume Void", s: "L x W x H", i: "1000cm³ = 1 Litre.", q: "Cube with side 3cm. What is the volume?", a: 27 },
    heuristics: { t: "Logic Labyrinth", s: "Assumption", i: "Assume all are one type, find gap.", q: "5 animals, 14 legs. (Cows=4, Chickens=2). How many cows?", a: 2 }
  };

  let xp = 0;
  let currentTopic = null;

  function startTraining(topic) {
    currentTopic = data[topic];
    document.getElementById('map-view').classList.add('hidden');
    document.getElementById('quest-view').classList.remove('hidden');
    document.getElementById('q-title').innerText = currentTopic.t;
    document.getElementById('q-strategy').innerText = "Strategy: " + currentTopic.s;
    document.getElementById('q-tip').innerText = "💡 " + currentTopic.i;
    document.getElementById('q-text').innerText = currentTopic.q;
    document.getElementById('q-feedback').innerText = "";
    document.getElementById('user-input').value = "";
  }

  function goHome() {
    document.getElementById('map-view').classList.remove('hidden');
    document.getElementById('quest-view').classList.add('hidden');
  }

  function doAttack() {
    const val = parseInt(document.getElementById('user-input').value);
    const fb = document.getElementById('q-feedback');
    if (val === currentTopic.a) {
      fb.innerHTML = "💥 SUCCESS! +20 XP"; fb.style.color = "#4ecca3";
      xp += 20;
      document.getElementById('xp-count').innerText = xp;
      document.getElementById('xp-fill').style.width = (xp % 100) + "%";
      if (xp >= 60) document.getElementById('rank-name').innerText = "Math Warrior ⚔️";
      setTimeout(goHome, 1200);
    } else {
      fb.innerHTML = "❌ DEFLECTED! Try again."; fb.style.color = "#e94560";
    }
  }
</script>
    </div>
  </main> </body>
</html>
