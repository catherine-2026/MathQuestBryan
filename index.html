<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5, user-scalable=yes">
    <title>Maths Quest</title>
    <style>
      :root { 
        --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; 
        --danger: #ff5e78; --gold: #fca311;
      }
      * { box-sizing: border-box; }
      body { 
        margin: 0; padding: 5px; background: var(--bg); 
        font-family: sans-serif; color: white;
        height: 100vh; display: flex; justify-content: center;
      }
      #app { 
        width: 100%; max-width: 380px; min-height: 100%;
        background: var(--panel); border: 2px solid var(--accent); 
        border-radius: 12px; display: flex; flex-direction: column; padding: 10px;
        position: relative;
      }
      header { text-align: center; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
      h1 { margin: 0; color: var(--gold); font-size: 1.1rem; }
      .bryan-line { font-size: 0.75rem; color: var(--gold); font-weight: bold; margin: 2px 0; }
      #game-content { flex: 1; padding: 10px 0; overflow-y: auto; }
      .map-grid { display: grid; gap: 6px; }
      .quest-btn { 
        background: #0f3460; border: 1px solid var(--accent); color: white; padding: 10px; 
        border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; text-align: left;
      }
      .boss-area { border: 2px dashed var(--danger); padding: 12px; text-align: center; border-radius: 10px; background: rgba(0,0,0,0.2); }
      #q-text { font-size: 0.95rem; margin-bottom: 8px; display: block; }
      input { padding: 8px; width: 100%; border-radius: 5px; border: 2px solid var(--accent); font-size: 1.1rem; margin-bottom: 8px; text-align: center; }
      .attack-btn { background: var(--danger); color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.9rem; }
      .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #aaa; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 8px; }
      footer { padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
      .gem-row { display: flex; justify-content: space-around; margin-bottom: 5px; }
      .gem-link { text-decoration: none; text-align: center; color: white; font-size: 0.55rem; }
      .gem { font-size: 1.1rem; display: block; }
      .hidden { display: none !important; }
      #victory-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(26, 26, 46, 0.98); display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px;
      }
    </style>
</head>
<body>
<main id="app">
  <header>
    <h1>⚔️ MATH QUEST ⚔️</h1>
    <p class="bryan-line">✨ Created with ❤️ for Bryan ✨</p>
    <div style="font-size: 0.85rem; font-weight: bold; color: var(--accent);">
      Score: <span id="score-display">0</span>
      <button onclick="resetScore()" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:0.55rem; padding:1px 4px; margin-left:8px; border-radius:3px;">Reset</button>
    </div>
  </header>

  <div id="game-content">
    <div id="map-view">
      <div class="map-grid">
        <button class="quest-btn" onclick="startTraining('ratios')">🔀 Ratio Realm</button>
        <button class="quest-btn" onclick="startTraining('geometry')">📐 Angle Abyss</button>
        <button class="quest-btn" onclick="startTraining('percentage')">💰 Percent Palace</button>
        <button class="quest-btn" onclick="startTraining('volume')">💧 Volume Void</button>
        <button class="quest-btn" onclick="startTraining('heuristics')">🧠 Logic Labyrinth</button>
      </div>
    </div>

    <div id="quest-view" class="hidden">
      <button class="back-btn" onclick="goHome()">⬅️ Back</button>
      <div class="boss-area">
        <h4 id="q-title" style="margin:0 0 8px 0; color:var(--accent); font-size: 0.9rem;"></h4>
        <p id="q-text"></p>
        <input type="number" id="user-input" inputmode="numeric">
        <button class="attack-btn" onclick="doAttack()">ATTACK!</button>
        <p id="q-feedback" style="margin-top: 8px; font-size: 0.8rem;"></p>
      </div>
    </div>
  </div>

  <div id="victory-screen" class="hidden">
    <h1 style="font-size: 2.5rem;">🏆</h1>
    <h2 style="font-size: 1.2rem;">LEVEL UP!</h2>
    <p style="font-size: 0.9rem;">Bryan defeated the challenge!</p>
    <button class="attack-btn" onclick="goHome()" style="margin-top: 15px; width: 120px;">Next</button>
  </div>

  <footer>
    <div class="gem-row">
      <a href="https://gemini.google.com/gem/14PMn2hzOV7c6aFUwviTmGkAlypz757uG" target="_blank" class="gem-link"><span class="gem">💎</span>Grader</a>
      <a href="https://gemini.google.com/gem/1kl4CP0hBA3ANwk2TPv0IFouJRUH9sC-m" target="_blank" class="gem-link"><span class="gem">💎</span>Drill</a>
      <a href="https://gemini.google.com/gem/1NtyzKWt_6ETZJyhw41vUDD_X5X-P0jDJ" target="_blank" class="gem-link"><span class="gem">💎</span>Coach</a>
    </div>
    <div style="font-size: 0.5rem; color: gray; text-align: center;">© 2026 Catherine N.C.L</div>
  </footer>
</main>

<script>
  let totalScore = 0;
  let currentQ = null;

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
  }

  const questBank = {
    ratios: [
      {q: "Ratio 2:5. If larger is 25, find smaller.", a: 10}, {q: "Ratio 1:4. Total is 50. Find smaller.", a: 10},
      {q: "Ratio 3:2. Smaller is 12. Find larger.", a: 18}, {q: "3 units = 21. Find 5 units.", a: 35},
      {q: "Ratio 7:3. Difference is 20. Find 1 unit.", a: 5}, {q: "Ratio 4:9. Larger is 45. Find smaller.", a: 20},
      {q: "Total 40, ratio 3:5. Find larger.", a: 25}, {q: "Ratio 1:1. Total is 100. Find one part.", a: 50},
      {q: "Ratio 2:3. Smaller is 10. Find total.", a: 25}, {q: "10 units = 100. Find 7 units.", a: 70}
    ],
    geometry: [
      {q: "Triangle: 90°, 30°. Find 3rd angle.", a: 60}, {q: "Straight line: 120° and ?", a: 60},
      {q: "Square area is 64. Find side length.", a: 8}, {q: "Rect: Length 10, Width 5. Perimeter?", a: 30},
      {q: "Sum of angles in a triangle?", a: 180}, {q: "Equilateral triangle angle?", a: 60},
      {q: "Right angle minus 15° is?", a: 75}, {q: "Isosceles: 2 angles are 50°. 3rd angle?", a: 80},
      {q: "Angles in a square total?", a: 360}, {q: "Circle radius 5. Find diameter.", a: 10}
    ],
    percentage: [
      {q: "9% GST on $100?", a: 9}, {q: "10% of 250?", a: 25},
      {q: "Convert 0.75 to percentage.", a: 75}, {q: "20% of 80?", a: 16},
      {q: "Original $50, 10% discount. New price?", a: 45}, {q: "50% of what number is 30?", a: 60},
      {q: "Increase 40 by 100%.", a: 80}, {q: "What is 1/4 as a percentage?", a: 25},
      {q: "5% of 200?", a: 10}, {q: "A toy costs $20. GST (9%) is $?", a: 1.8}
    ],
    volume: [
      {q: "Cube side 2cm. Volume?", a: 8}, {q: "Rect block: 5x2x3. Volume?", a: 30},
      {q: "1 Litre = 1000ml. Half litre?", a: 500}, {q: "Tank 10x10x10. Find Volume.", a: 1000},
      {q: "Base Area 20, Height 5. Volume?", a: 100}, {q: "How many 1cm cubes fit in a 2x2x2 box?", a: 8},
      {q: "Volume of cube with side 3?", a: 27}, {q: "Cube side 4. Volume?", a: 64},
      {q: "Volume 120, Length 10, Width 3. Height?", a: 4}, {q: "4000cm³ is how many Litres?", a: 4}
    ],
    heuristics: [
      {q: "5 animals, 14 legs (Cows=4, Hens=2). Cows?", a: 2}, {q: "Double a number and add 5 = 15. Number?", a: 5},
      {q: "Pattern: 2, 4, 8, 16, ?", a: 32}, {q: "3 apples $6. How much for 5 apples?", a: 10},
      {q: "Gap between 1st and 5th post (5m each)?", a: 20}, {q: "I think of a number, divide by 2 = 10. Number?", a: 20},
      {q: "2 people = 1 handshake. 3 people?", a: 3}, {q: "A bus starts with 10 kids, 5 drop, 2 enter. Total?", a: 7},
      {q: "Book has 10 pages. How many '1' digits?", a: 2}, {q: "Snail climbs 3m, slips 2m daily. 5m wall days?", a: 3}
    ]
  };

  function startTraining(topic) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const list = questBank[topic];
    currentQ = list[Math.floor(Math.random() * list.length)];
    document.getElementById('map-view').classList.add('hidden');
    document.getElementById('quest-view').classList.remove('hidden');
    document.getElementById('q-title').innerText = topic.toUpperCase();
    document.getElementById('q-text').innerText = currentQ.q;
    document.getElementById('q-feedback').innerText = "";
    document.getElementById('user-input').value = "";
  }

  function goHome() {
    document.getElementById('map-view').classList.remove('hidden');
    document.getElementById('quest-view').classList.add('hidden');
    document.getElementById('victory-screen').classList.add('hidden');
  }

  function doAttack() {
    const val = parseFloat(document.getElementById('user-input').value);
    if (val === currentQ.a) {
      playSound('correct');
      totalScore += 10;
      document.getElementById('score-display').innerText = totalScore;
      document.getElementById('victory-screen').classList.remove('hidden');
    } else {
      playSound('incorrect');
      document.getElementById('q-feedback').innerText = "❌ Try Again!";
    }
  }

  function resetScore() {
    if(confirm("Reset Score?")) {
      totalScore = 0;
      document.getElementById('score-display').innerText = "0";
    }
  }
</script>
</body>
</html>
