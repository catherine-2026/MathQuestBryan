<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Maths Quest 50</title>
    <style>
      :root { 
        --bg: #1a1a2e; 
        --panel: #16213e; 
        --accent: #4ecca3; 
        --danger: #ff5e78; 
        --gold: #fca311; 
        --text-main: #ffffff;
      }
      
      html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background: var(--bg); }
      body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; box-sizing: border-box; }

      #app { 
        width: 100%; max-width: 400px; background: var(--panel); border: 3px solid var(--accent); 
        border-radius: 15px; padding: 20px; box-sizing: border-box; min-height: 85vh;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        position: relative;
      }

      header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
      
      #q-text { color: #ffffff !important; font-size: 1.3rem; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

      .map-grid { display: grid; gap: 12px; }

      .quest-btn { 
        background: #0f3460; border: 2px solid var(--accent); color: white; padding: 18px; 
        border-radius: 10px; cursor: pointer; font-weight: bold; text-align: left; font-size: 1.1rem;
      }

      .boss-area { border: 2px dashed var(--danger); padding: 20px; text-align: center; border-radius: 12px; margin-top: 20px; background: rgba(255,255,255,0.05); }
      
      input { padding: 15px; width: 80%; border-radius: 8px; border: 2px solid var(--accent); font-size: 20px; margin-bottom: 15px; text-align: center; color: #000; background: #fff; font-weight: bold; }
      
      .attack-btn { background: var(--danger); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; }
      .back-btn { background: transparent; border: 1px solid #aaa; color: #aaa; cursor: pointer; margin-bottom: 20px; padding: 8px 15px; border-radius: 5px; }

      .gem-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding-top: 30px; }
      .gem-row { display: flex; justify-content: space-evenly; width: 100%; align-items: flex-start; margin-bottom: 20px; }
      .gem-link { text-decoration: none; text-align: center; flex: 1; }
      .gem { font-size: 1.8rem; filter: drop-shadow(0 0 8px currentColor); animation: float 3s ease-in-out infinite; cursor: pointer; display: block; }
      .gem-label { font-size: 0.65rem; color: #fff; opacity: 0.9; margin-top: 5px; font-weight: bold; }

      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      
      /* THIS IS THE CRITICAL FIX FOR CLICKING */
      .hidden { display: none !important; pointer-events: none !important; }
    </style>
</head>
<body>

<main id="app">
  <header>
    <h1 style="margin: 0; color: var(--gold); font-size: 1.8rem; text-shadow: 0 0 10px rgba(252, 163, 17, 0.3);">⚔️ MATH QUEST ⚔️</h1>
    <p style="font-size:1.1rem; color:var(--gold); font-weight:bold; margin: 10px 0 0 0;">✨ Created with ❤️ for Bryan ✨</p>
  </header>

  <div id="victory-screen" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(22, 33, 62, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box;">
    <h1 style="color: var(--gold); font-size: 3rem; margin: 0;">🏆</h1>
    <h2 style="color: var(--accent);">LEVEL UP!</h2>
    <p style="color: white; font-size: 1.2rem;">Bryan defeated the challenge!</p>
    <button class="attack-btn" onclick="goHome()" style="margin-top: 20px; max-width: 200px;">Return to Map</button>
  </div>

  <div id="map-view">
    <div class="map-grid">
      <button class="quest-btn" onclick="startTraining('ratios')">🔀 Ratio Realm</button>
      <button class="quest-btn" onclick="startTraining('geometry')">📐 Angle Abyss</button>
      <button class="quest-btn" onclick="startTraining('percentage')">💰 Percent Palace</button>
      <button class="quest-btn" onclick="startTraining('volume')">💧 Volume Void</button>
      <button class="quest-btn" onclick="startTraining('heuristics')">🧠 Logic Labyrinth</button>
    </div>
  </div>

  <div id="quest-view" class="hidden">
    <button class="back-btn" onclick="goHome()">⬅️ Back</button>
    <h2 id="q-title" style="color: var(--accent); margin: 0; font-size: 1.3rem; text-align:center;"></h2>
    <div class="boss-area">
      <p id="q-text" style="font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5;"></p>
      <input type="number" id="user-input" placeholder="Answer..." inputmode="numeric">
      <button class="attack-btn" onclick="doAttack()">ATTACK!</button>
      <p id="q-feedback" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
  </div>

  <div class="gem-container">
    <div class="gem-row">
      <a href="https://gemini.google.com/gem/14PMn2hzOV7c6aFUwviTmGkAlypz757uG" target="_blank" class="gem-link">
          <span class="gem" style="color: #4ecca3;">💎</span>
          <div class="gem-label">Grader</div>
      </a>
      <a href="https://gemini.google.com/gem/1kl4CP0hBA3ANwk2TPv0IFouJRUH9sC-m" target="_blank" class="gem-link">
          <span class="gem" style="color: #ff5e78;">💎</span>
          <div class="gem-label">Drill</div>
      </a>
      <a href="https://gemini.google.com/gem/1NtyzKWt_6ETZJyhw41vUDD_X5X-P0jDJ" target="_blank" class="gem-link">
          <span class="gem" style="color: #fca311;">💎</span>
          <div class="gem-label">Coach</div>
      </a>
    </div>
    <div style="font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; width: 100%; margin-top: 10px;">
      Copyright © 2026 [Catherine N.C.L]. All Rights Reserved.
    </div>
  </div>
</main>

<script>
  const questBank = {
    ratios: [
      {q: "Ratio 2:5. If larger is 25, find smaller.", a: 10},
      {q: "Ratio 1:4. Total is 50. Find smaller.", a: 10},
      {q: "Ratio 3:2. Smaller is 12. Find larger.", a: 18},
      {q: "3 units = 21. Find 5 units.", a: 35},
      {q: "Ratio 7:3. Difference is 20. Find 1 unit.", a: 5},
      {q: "Ratio 4:9. Larger is 45. Find smaller.", a: 20},
      {q: "Total 40, ratio 3:5. Find larger.", a: 25},
      {q: "Ratio 1:1. Total is 100. Find one part.", a: 50},
      {q: "Ratio 2:3. Smaller is 10. Find total.", a: 25},
      {q: "10 units = 100. Find 7 units.", a: 70}
    ],
    geometry: [
      {q: "Triangle: 90°, 30°. Find 3rd angle.", a: 60},
      {q: "Straight line: 120° and ?", a: 60},
      {q: "Square area is 64. Find side length.", a: 8},
      {q: "Rect: Length 10, Width 5. Perimeter?", a: 30},
      {q: "Sum of angles in a triangle?", a: 180},
      {q: "Equilateral triangle angle?", a: 60},
      {q: "Right angle minus 15° is?", a: 75},
      {q: "Isosceles: 2 angles are 50°. 3rd angle?", a: 80},
      {q: "Angles in a square total?", a: 360},
      {q: "Circle radius 5. Find diameter.", a: 10}
    ],
    percentage: [
      {q: "9% GST on $100?", a: 9},
      {q: "10% of 250?", a: 25},
      {q: "Convert 0.75 to percentage.", a: 75},
      {q: "20% of 80?", a: 16},
      {q: "Original $50, 10% discount. New price?", a: 45},
      {q: "50% of what number is 30?", a: 60},
      {q: "Increase 40 by 100%.", a: 80},
      {q: "What is 1/4 as a percentage?", a: 25},
      {q: "5% of 200?", a: 10},
      {q: "A toy costs $20. GST (9%) is $?", a: 1.8}
    ],
    volume: [
      {q: "Cube side 2cm. Volume?", a: 8},
      {q: "Rect block: 5x2x3. Volume?", a: 30},
      {q: "1 Litre = 1000ml. Half litre?", a: 500},
      {q: "Tank 10x10x10. Find Volume.", a: 1000},
      {q: "Base Area 20, Height 5. Volume?", a: 100},
      {q: "How many 1cm cubes fit in a 2x2x2 box?", a: 8},
      {q: "Volume of cube with side 3?", a: 27},
      {q: "Cube side 4. Volume?", a: 64},
      {q: "Volume 120, Length 10, Width 3. Height?", a: 4},
      {q: "4000cm³ is how many Litres?", a: 4}
    ],
    heuristics: [
      {q: "5 animals, 14 legs (Cows=4, Hens=2). Cows?", a: 2},
      {q: "Double a number and add 5 = 15. Number?", a: 5},
      {q: "Pattern: 2, 4, 8, 16, ?", a: 32},
      {q: "3 apples $6. How much for 5 apples?", a: 10},
      {q: "Gap between 1st and 5th post (5m each)?", a: 20},
      {q: "I think of a number, divide by 2 = 10. Number?", a: 20},
      {q: "2 people = 1 handshake. 3 people?", a: 3},
      {q: "A bus starts with 10 kids, 5 drop, 2 enter. Total?", a: 7},
      {q: "Book has 10 pages. How many '1' digits?", a: 2},
      {q: "Snail climbs 3m, slips 2m daily. 5m wall days?", a: 3}
    ]
  };

  let currentQ = null;

  function startTraining(topic) {
    const list = questBank[topic];
    currentQ = list[Math.floor(Math.random() * list.length)];
    document.getElementById('map-view').classList.add('hidden');
    document.getElementById('quest-view').classList.remove('hidden');
    document.getElementById('victory-screen').classList.add('hidden');
    document.getElementById('q-title').innerText = topic.toUpperCase();
    document.getElementById('q-text').innerText = currentQ.q;
    document.getElementById('q-feedback').innerText = "";
    document.getElementById('user-input').value = "";
    window.scrollTo(0,0);
  }

  function goHome() {
    document.getElementById('map-view').classList.remove('hidden');
    document.getElementById('quest-view').classList.add('hidden');
    document.getElementById('victory-screen').classList.add('hidden');
    window.scrollTo(0,0);
  }

  function doAttack() {
    const userInput = document.getElementById('user-input').value;
    if (userInput === "") return;
    const val = parseFloat(userInput);
    const fb = document.getElementById('q-feedback');
    
    if (val === currentQ.a) {
      document.getElementById('victory-screen').classList.remove('hidden');
      document.getElementById('quest-view').classList.add('hidden');
    } else {
      fb.innerHTML = "❌ TRY AGAIN!"; 
      fb.style.color = "var(--danger)";
    }
  }
</script>
</body>
</html>
