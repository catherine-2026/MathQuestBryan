<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Maths Quest 50</title>
    <style>
      :root { 
        --bg: #1a1a2e; 
        --panel: #16213e; 
        --accent: #4ecca3; 
        --danger: #ff5e78; 
        --gold: #fca311; 
        --text-main: #ffffff;
      }
      
      html, body { 
        overflow-x: hidden; 
        width: 100%; 
        margin: 0; 
        padding: 0; 
        background: var(--bg);
      }

      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        display: flex; 
        justify-content: center; 
        padding: 10px; 
        box-sizing: border-box;
      }

      #app { 
        width: 100%;
        max-width: 400px; 
        background: var(--panel); 
        border: 3px solid var(--accent); 
        border-radius: 15px; 
        padding: 20px;
        box-sizing: border-box;
        min-height: 85vh;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
      }

      header { text-align: center; margin-bottom: 20px; }

      .map-grid { display: grid; gap: 12px; }

      .quest-btn { 
        background: #0f3460; 
        border: 2px solid var(--accent); 
        color: white; 
        padding: 18px; 
        border-radius: 10px; 
        cursor: pointer; 
        font-weight: bold; 
        text-align: left;
        font-size: 1.1rem;
        transition: 0.2s;
      }
      .quest-btn:active { transform: scale(0.98); background: var(--accent); color: #111; }
