<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Maths Quest 50</title>
    <style>
      :root { 
        --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; 
        --danger: #ff5e78; --gold: #fca311; --text-main: #ffffff;
      }
      html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background: var(--bg); }
      body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; box-sizing: border-box; }
      #app { 
        width: 100%; max-width: 400px; background: var(--panel); border: 3px solid var(--accent); 
        border-radius: 15px; padding: 20px; box-sizing: border-box; min-height: 85vh;
        display: flex; flex-direction: column; position: relative;
      }
      header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
      #q-text { color: #ffffff !important; font-size: 1.3rem; font-weight: 500; margin-bottom: 20px; display: block; }
      .map-grid { display: grid; gap: 12px; }
      .quest-btn { 
        background: #0f3460; border: 2px solid var(--accent); color: white; padding: 18px; 
        border-radius: 10px; cursor: pointer; font-weight: bold; text-align: left; font-size: 1.1rem;
      }
      .boss-area { border: 2px dashed var(--danger); padding: 20px; text-align: center; border-radius: 12px; margin-top: 20px; background: rgba(255,255,255,0.05); }
      input { padding: 15px; width: 80%; border-radius: 8px; border: 2px solid var(--accent); font-size: 20px; margin-bottom: 15px; text-align: center; color: #000; background: #fff; font-weight: bold; }
      .attack-btn { background: var(--danger); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; }
      .back-btn { background: transparent; border: 1px solid #aaa; color: #aaa; cursor: pointer; margin-bottom: 20px; padding: 8px 15px; border-radius: 5px; }
      .gem-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding-top: 30px; }
      .gem-row { display: flex; justify-content: space-evenly; width: 100%; margin-bottom: 20px; }
      .gem-link { text-decoration: none; text-align: center; flex: 1; }
      .gem { font-size: 1.8rem; display: block; margin-bottom: 5px; }
      .gem-label { font-size: 0.65rem; color: #fff; opacity: 0.9; font-weight: bold; }
      /* THE FIX FOR THE CLICKING ISSUE */
      .hidden { display: none !important; pointer-events: none !important; visibility: hidden !important; }
      #victory-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(22, 33, 62, 0.98); display: flex; flex-direction: column;
        justify-content: center; align-items: center; border-radius: 12px; z-index: 99; text-align: center; padding: 20px; box-sizing: border-box;
      }
    </style>
</head>
<body>
<main id="app">
  <header>
    <h1 style="margin: 0; color: var(--gold); font-size: 1.8rem;">⚔️ MATH QUEST ⚔️</h1>
    <p style="font-size:1.1rem; color:var(--gold); font-weight:bold; margin: 10px 0 0 0;">✨ Created with ❤️ for Bryan ✨</p>
  </header>

    <h1 style="font-size: 4rem; margin: 0;">🏆</h1>
    <h2 style="color: var(--accent);">LEVEL UP!</h2>
    <p style="color: white; font-size: 1.2rem;">Bryan defeated the challenge!</p>
